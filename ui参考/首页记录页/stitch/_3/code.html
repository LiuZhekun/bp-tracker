<!DOCTYPE html>

<html class="h-full" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#217128",
                        "on-surface": "#191c1e",
                        "on-secondary": "#ffffff",
                        "primary": "#0058bc",
                        "on-error-container": "#93000a",
                        "error-container": "#ffdad6",
                        "surface": "#f7f9fc",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb3ac",
                        "on-tertiary-container": "#fffbff",
                        "secondary": "#1b6d24",
                        "on-background": "#191c1e",
                        "primary-fixed": "#d8e2ff",
                        "outline": "#717786",
                        "on-tertiary-fixed": "#410003",
                        "on-secondary-fixed": "#002204",
                        "surface-container-highest": "#e0e3e6",
                        "tertiary": "#b6171e",
                        "surface-container-lowest": "#ffffff",
                        "inverse-surface": "#2d3133",
                        "inverse-on-surface": "#eff1f4",
                        "error": "#ba1a1a",
                        "surface-tint": "#005bc1",
                        "surface-container-low": "#f2f4f7",
                        "on-primary-fixed-variant": "#004493",
                        "background": "#f7f9fc",
                        "inverse-primary": "#adc6ff",
                        "secondary-fixed-dim": "#88d982",
                        "on-primary-container": "#fefcff",
                        "on-error": "#ffffff",
                        "surface-container-high": "#e6e8eb",
                        "on-surface-variant": "#414755",
                        "tertiary-container": "#da3433",
                        "surface-dim": "#d8dadd",
                        "primary-container": "#0070eb",
                        "secondary-fixed": "#a3f69c",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed-variant": "#005312",
                        "primary-fixed-dim": "#adc6ff",
                        "secondary-container": "#a0f399",
                        "on-primary-fixed": "#001a41",
                        "surface-variant": "#e0e3e6",
                        "on-tertiary-fixed-variant": "#930010",
                        "surface-container": "#eceef1",
                        "surface-bright": "#f7f9fc",
                        "tertiary-fixed": "#ffdad6",
                        "outline-variant": "#c1c6d7"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Lexend"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            }
        }
    </script>
<style>
        .voice-pulse {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.15); opacity: 0.2; }
            100% { transform: scale(1); opacity: 0.6; }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface h-screen overflow-hidden flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm h-16 flex justify-between items-center px-6">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-blue-600 dark:text-blue-400" data-icon="monitor_heart">monitor_heart</span>
<h1 class="font-['Lexend'] font-bold text-lg tracking-tight text-blue-700 dark:text-blue-400">VitalEase Pulse</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden active:scale-95 transition-transform">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="close-up portrait of a smiling elderly man with kind eyes and grey hair, soft warm indoor lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD4hNsmhWKRzO3LNiB95ZCwksgXXb8gWFp_luBrhBUZoDhKcWFvf03avEWT9TBXMY1lYoFi1aCOaOOK5wAE_7sud4FKyvoeiFFpx6iXsPQ9Q1MzQoh0dLw8yVNYhSzW4NIUkxTGTWiNZ7yA4pcerHyvgjlU0HLPjCaAVHElG_JxmvhFsEqCOY_VxC1pDNGbDioetvMEF5lvj18Hi0XJOWD-B6y53bqtyv_ve20Ko_DWyT33mSYxAd1Lu7p-PXfeH4Ah5rv5CWxva_s"/>
</div>
</header>
<main class="flex-1 flex flex-col pt-16 pb-6 px-6 overflow-hidden">
<!-- Top Half: Voice Input Animation -->
<section class="flex-1 flex flex-col items-center justify-center relative py-4">
<div class="text-center mb-6">
<h2 class="font-headline text-2xl font-bold text-primary mb-2">正在聆听...</h2>
<p class="text-on-surface-variant font-medium">请说出您的血压数值</p>
</div>
<!-- Voice Ring Visualization -->
<div class="relative flex items-center justify-center">
<div class="absolute w-48 h-48 bg-primary/10 rounded-full voice-pulse"></div>
<div class="absolute w-36 h-36 bg-primary/20 rounded-full voice-pulse" style="animation-delay: 0.5s;"></div>
<button class="relative z-10 w-24 h-24 bg-gradient-to-br from-primary to-primary-container rounded-full shadow-2xl flex items-center justify-center text-white active:scale-90 transition-all duration-300">
<span class="material-symbols-outlined text-4xl" data-icon="mic" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<!-- Real-time transcription placeholder (Subtle) -->
<div class="mt-8 px-6 py-3 bg-surface-container-low rounded-xl text-center max-w-xs">
<span class="text-on-surface/60 italic">"高压一百二十，低压八十..."</span>
</div>
</section>
<!-- Bottom Half: Manual Input Area -->
<section class="bg-surface-container-lowest rounded-xl p-5 shadow-sm space-y-4">
<div class="grid grid-cols-3 gap-3">
<!-- Systolic -->
<div class="space-y-1.5">
<label class="block text-xs font-bold text-on-surface-variant tracking-wide px-1">收缩压</label>
<div class="relative">
<input class="w-full h-14 bg-surface-container-low border-none rounded-lg text-center font-headline text-xl font-semibold text-on-surface focus:ring-2 focus:ring-primary/20 transition-all" placeholder="120" type="number"/>
<span class="absolute bottom-1 right-2 text-[10px] text-outline opacity-60">mmHg</span>
</div>
</div>
<!-- Diastolic -->
<div class="space-y-1.5">
<label class="block text-xs font-bold text-on-surface-variant tracking-wide px-1">舒张压</label>
<div class="relative">
<input class="w-full h-14 bg-surface-container-low border-none rounded-lg text-center font-headline text-xl font-semibold text-on-surface focus:ring-2 focus:ring-primary/20 transition-all" placeholder="80" type="number"/>
<span class="absolute bottom-1 right-2 text-[10px] text-outline opacity-60">mmHg</span>
</div>
</div>
<!-- Pulse -->
<div class="space-y-1.5">
<label class="block text-xs font-bold text-on-surface-variant tracking-wide px-1">脉搏</label>
<div class="relative">
<input class="w-full h-14 bg-surface-container-low border-none rounded-lg text-center font-headline text-xl font-semibold text-on-surface focus:ring-2 focus:ring-primary/20 transition-all" placeholder="72" type="number"/>
<span class="absolute bottom-1 right-2 text-[10px] text-outline opacity-60">bpm</span>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-16 bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline text-lg font-bold rounded-lg shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                保存记录
            </button>
</section>
</main>
<!-- Suppressed Nav Shell (as per requirement for focused task) -->
<!-- But if required, the space is preserved by h-screen logic. Suppression active for Task-Focused screens. -->
</body></html>
