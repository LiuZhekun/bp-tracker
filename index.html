<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="血压记录">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <title>血压记录</title>
</head>
<body>

  <!-- ===== 视图1：录入 ===== -->
  <div id="view-add" class="view active">
    <header class="page-header">
      <h1>血压记录</h1>
    </header>
    <main class="page-main">

      <!-- 语音输入卡片 -->
      <div class="card voice-card">
        <!-- 待机状态：麦克风按钮 -->
        <div id="voice-idle" class="voice-idle">
          <button id="voice-btn" class="mic-btn">
            <span class="mic-icon">🎤</span>
          </button>
          <p class="voice-desc">点击说出血压数值</p>
          <p class="voice-example">例：高压130 低压85 心率72</p>
        </div>

        <!-- 录音中状态 -->
        <div id="voice-recording" class="voice-recording hidden">
          <div class="voice-wave">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <p class="recording-label">正在听...</p>
          <p id="voice-interim" class="voice-interim"></p>
          <button id="voice-stop-btn" class="stop-btn">停止</button>
        </div>
      </div>

      <!-- 数据表单 -->
      <div class="form-card card">

        <div class="form-row">
          <span class="form-label">收缩压</span>
          <div class="form-value">
            <input type="number" id="input-sys" min="60" max="260"
                   placeholder="—" inputmode="numeric">
            <span class="form-unit">mmHg</span>
          </div>
        </div>
        <div class="row-sep"></div>

        <div class="form-row">
          <span class="form-label">舒张压</span>
          <div class="form-value">
            <input type="number" id="input-dia" min="40" max="150"
                   placeholder="—" inputmode="numeric">
            <span class="form-unit">mmHg</span>
          </div>
        </div>
        <div class="row-sep"></div>

        <div class="form-row">
          <span class="form-label">心率</span>
          <div class="form-value">
            <input type="number" id="input-pulse" min="30" max="220"
                   placeholder="—" inputmode="numeric">
            <span class="form-unit">次/分</span>
          </div>
        </div>
        <div class="row-sep"></div>

        <div class="form-row">
          <span class="form-label">时间</span>
          <input type="datetime-local" id="input-time" class="form-input-right">
        </div>
        <div class="row-sep"></div>

        <div class="form-row">
          <span class="form-label">备注</span>
          <input type="text" id="input-note" class="form-input-right"
                 placeholder="可选" maxlength="30">
        </div>

      </div>

      <button id="save-btn" class="save-btn">保存</button>

    </main>
  </div>

  <!-- ===== 视图2：图表 ===== -->
  <div id="view-chart" class="view">
    <header class="page-header">
      <h1>趋势图表</h1>
    </header>
    <main class="page-main">

      <div class="seg-control">
        <button class="seg-btn active" data-range="day">今天</button>
        <button class="seg-btn" data-range="month30">近一月</button>
        <button class="seg-btn" data-range="month">本月</button>
        <button class="seg-btn" data-range="year">今年</button>
      </div>

      <div id="chart-wrap" class="card chart-wrap">
        <canvas id="bp-chart"></canvas>
        <div class="chart-legend">
          <span class="l-sys">● 收缩压</span>
          <span class="l-dia">● 舒张压</span>
          <span class="l-pulse">● 心率</span>
        </div>
      </div>

      <div id="no-data-chart" class="empty-state hidden">
        <p>📊</p>
        <p>暂无数据</p>
        <p class="empty-sub">请先在录入页添加记录</p>
      </div>

      <div id="latest-stats" class="card stats-card hidden">
        <p class="stats-title">最近一次测量</p>
        <div class="stats-nums">
          <div class="stats-bp">
            <span id="stat-sys" class="snum sys">--</span>
            <span class="sdiv">/</span>
            <span id="stat-dia" class="snum dia">--</span>
            <span class="sunit">mmHg</span>
          </div>
          <div class="stats-pulse">
            <span id="stat-pulse" class="snum pulse">--</span>
            <span class="sunit">次/分</span>
          </div>
        </div>
        <p id="stat-time" class="stats-time"></p>
      </div>

    </main>
  </div>

  <!-- ===== 视图3：历史 ===== -->
  <div id="view-history" class="view">
    <header class="page-header">
      <h1>历史记录</h1>
      <button id="export-btn" class="header-action">导出</button>
    </header>
    <main class="page-main">
      <div id="record-list"></div>
      <div id="no-data-history" class="empty-state hidden">
        <p>📋</p>
        <p>暂无记录</p>
        <p class="empty-sub">请先在录入页添加记录</p>
      </div>
    </main>
  </div>

  <!-- ===== Tab 导航 ===== -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-view="add">
      <span class="tab-icon">＋</span>
      <span class="tab-label">录入</span>
    </button>
    <button class="tab-btn" data-view="chart">
      <span class="tab-icon">📈</span>
      <span class="tab-label">图表</span>
    </button>
    <button class="tab-btn" data-view="history">
      <span class="tab-icon">📋</span>
      <span class="tab-label">历史</span>
    </button>
  </nav>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- 删除确认 -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-sheet">
      <p class="modal-msg">确认删除这条记录？</p>
      <button id="confirm-ok" class="modal-del-btn">删除</button>
      <button id="confirm-cancel" class="modal-cancel-btn">取消</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
